<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等距方塊建造器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="editor-ui">
  <div id="toolbar">
    <div id="selectorRow">
      <select id="srcSelect"></select>
      <select id="catSelect"></select>
      <select id="elemSelect">
        <option value="">全屬性</option>
        <option value="金">金</option>
        <option value="木">木</option>
        <option value="水">水</option>
        <option value="火">火</option>
        <option value="土">土</option>
        <option value="無">無</option>
      </select>
      <input id="tileSearch" type="text" placeholder="搜尋..." class="tile-search">
      <button id="charLibBtn">角色庫</button>
      <button id="modeToggle" class="mode-btn">遊戲模式</button>
    </div>
    <div id="tilePalette"></div>
    <div id="toggleRow">
      <span class="fold-toggle" data-target="foldTools">工具箱 ▼</span>
      <span class="fold-toggle" data-target="foldShortcuts">快捷類 ▼</span>
      <span class="fold-toggle" data-target="foldDisplay">顯示類 ▼</span>
      <span class="fold-toggle" data-target="foldVis">隱藏高度 ▼</span>
      <span class="fold-toggle" data-target="foldCombo">範本 ▼</span>
      <span class="fold-toggle" data-target="foldFog">迷霧 ▼</span>
      <span id="brushInfo" style="display:none;font-size:10px;color:#FFD700;"></span>
    </div>
    <div id="foldTools" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkBrush"> 筆刷</label>
      <label class="ck"><input type="checkbox" id="chkEraser"> 橡皮擦</label>
      <label class="ck"><input type="checkbox" id="chkFill"> 填充</label>
      <label class="ck"><input type="checkbox" id="chkRect"> 矩形</label>
      <label class="ck"><input type="checkbox" id="chkLine"> 線段</label>
    </div>
    <div id="foldShortcuts" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkSelect"> 選取</label>
      <label class="ck"><input type="checkbox" id="chkLocate"> 定位</label>
      <label class="ck"><input type="checkbox" id="chkCopy"> 複製</label>
      <label class="ck"><input type="checkbox" id="chkAutoSelect"> 自動選取</label>
    </div>
    <div id="foldDisplay" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkHover"> 懸停</label>
      <label class="ck"><input type="checkbox" id="chkGrid"> 格線</label>
      <label class="ck"><input type="checkbox" id="chkVGrid"> 立體</label>
      <label class="ck"><input type="checkbox" id="chkCoord"> 座標</label>
      <label class="ck"><input type="checkbox" id="chkMinimap"> 小地圖</label>
      <label class="ck"><input type="checkbox" id="chkLayerInfo"> 圖層標示</label>
      <label class="ck"><input type="checkbox" id="chkBlockInfo"> 屬性</label>
    </div>
    <div id="foldVis" class="fold-panel" style="display:none;">
      <select id="hideHeight"><option value="">無</option></select>
      <button id="hideHeightBtn" class="toggle-btn">隱藏</button>
      <button id="showAllBtn" class="toggle-btn">全部顯示</button>
    </div>
    <div id="foldCombo" class="fold-panel" style="display:none;">
      <button id="comboSave" class="toggle-btn">儲存</button>
      <button id="comboPlace" class="toggle-btn">放置</button>
      <select id="comboSelect"><option value="">-- 選擇範本 --</option></select>
      <button id="comboDel" class="toggle-btn danger-sm">刪除</button>
    </div>
    <div id="foldFog" class="fold-panel" style="display:none;">
      <label class="ck">半徑：</label>
      <select id="fogRadius">
        <option value="0">關閉</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
      </select>
      <label class="ck">中心X：</label>
      <input id="fogCenterGx" type="number" value="0" class="fog-input">
      <label class="ck">Y：</label>
      <input id="fogCenterGy" type="number" value="0" class="fog-input">
    </div>
  </div>
  <div id="hintRow">
    <div id="actions">
      <button id="undoBtn" class="act-btn">返回</button>
      <button id="redoBtn" class="act-btn">復原</button>
      <button id="saveBtn" class="act-btn">儲存</button>
      <button id="saveAsBtn" class="act-btn">另存</button>
      <button id="loadBtn" class="act-btn">載入</button>
      <button id="cloudSaveBtn" class="act-btn cloud-btn">☁ 上傳</button>
      <button id="cloudLoadBtn" class="act-btn cloud-btn">☁ 下載</button>
      <button id="homeBtn" class="act-btn">原點</button>
      <button id="exportImg" class="act-btn">匯出圖</button>
      <button id="exportOffsets" class="act-btn">匯出偏移</button>
      <button id="clearBtn" class="act-btn danger">清除全部</button>
    </div>
  </div>
  </div><!-- /editor-ui -->
  <div id="helpOverlay" class="help-overlay" style="display:none;">
    <div id="helpModal" class="help-modal">
      <div class="help-header">
        <span>操作說明</span>
        <button id="helpClose" class="help-close">&times;</button>
      </div>
      <div id="helpBody" class="help-body"></div>
    </div>
  </div>
  <div id="game-ui">
    <div id="gameTopBar">
      <button id="modeToggleGame" class="mode-btn">編輯模式</button>
    </div>
    <div id="buildMenu"></div>
  </div>
  <div id="canvasWrap">
    <div id="stagingArea">
      <div class="staging-title">暫存區</div>
      <div id="stagingGrid"></div>
      <span id="hintToggle">操作手冊</span>
    </div>
    <div id="resourcePanel">
      <div class="res-title">資源</div>
      <div class="res-row" data-res="金"><span class="res-icon">金</span><div class="res-bar-wrap"><div class="res-bar-fill" id="bar_金"></div></div><span class="res-val" id="val_金">0</span><span class="res-rate" id="rate_金">+0/h</span></div>
      <div class="res-row" data-res="木"><span class="res-icon">木</span><div class="res-bar-wrap"><div class="res-bar-fill" id="bar_木"></div></div><span class="res-val" id="val_木">0</span><span class="res-rate" id="rate_木">+0/h</span></div>
      <div class="res-row" data-res="水"><span class="res-icon">水</span><div class="res-bar-wrap"><div class="res-bar-fill" id="bar_水"></div></div><span class="res-val" id="val_水">0</span><span class="res-rate" id="rate_水">+0/h</span></div>
      <div class="res-row" data-res="火"><span class="res-icon">火</span><div class="res-bar-wrap"><div class="res-bar-fill" id="bar_火"></div></div><span class="res-val" id="val_火">0</span><span class="res-rate" id="rate_火">+0/h</span></div>
      <div class="res-row" data-res="土"><span class="res-icon">土</span><div class="res-bar-wrap"><div class="res-bar-fill" id="bar_土"></div></div><span class="res-val" id="val_土">0</span><span class="res-rate" id="rate_土">+0/h</span></div>
    </div>
    <div id="hlPanel">
      <div class="hl-card">
        <div class="hl-title">高度</div>
        <button class="hl-btn" id="heightUp">&#9650;</button>
        <span id="heightNum" class="hl-num">0</span>
        <button class="hl-btn" id="heightDown">&#9660;</button>
      </div>
      <div class="hl-card">
        <div class="hl-title">圖層</div>
        <button class="hl-btn" id="layerUp">&#9650;</button>
        <span id="layerNum" class="hl-num">0</span>
        <button class="hl-btn" id="layerDown">&#9660;</button>
      </div>
    </div>
    <canvas id="c"></canvas>
  </div>
  <div id="charLibOverlay" class="help-overlay" style="display:none;">
    <div class="help-modal" style="max-width:360px;">
      <div class="help-header">
        <span>角色庫</span>
        <button id="charLibClose" class="help-close">&times;</button>
      </div>
      <div class="help-body" style="padding:10px;">
        <div class="charlib-row">
          <label>來源</label>
          <select id="charStyleSelect" class="charlib-sel">
            <option value="outline">有框線</option>
            <option value="no_outline">無框線</option>
          </select>
        </div>
        <div class="charlib-row">
          <label>分類</label>
          <select id="charClsSelect" class="charlib-sel">
            <option value="">全部</option>
            <option value="村民">村民</option>
            <option value="步兵">步兵</option>
            <option value="射手">射手</option>
            <option value="法師">法師</option>
            <option value="騎兵">騎兵</option>
          </select>
          <label>類型</label>
          <select id="charTypeSelect" class="charlib-sel">
            <option value="">全部</option>
            <option value="物理">物理</option>
            <option value="魔法">魔法</option>
          </select>
        </div>
        <div class="charlib-row">
          <label>角色</label>
          <select id="charNameSelect" class="charlib-sel" style="flex:1;"></select>
        </div>
        <div class="charlib-row">
          <label>陣營</label>
          <select id="charFactionSelect" class="charlib-sel">
            <option value="正義" style="color:#4A9FDD">正義</option>
            <option value="反派" style="color:#E85050">反派</option>
            <option value="邪惡" style="color:#9B59B6">邪惡</option>
            <option value="善良" style="color:#5CBF5C">善良</option>
          </select>
          <span id="charStatsInfo" style="font-size:10px;color:#888;margin-left:4px;"></span>
        </div>
        <div class="charlib-canvas-wrap">
          <canvas id="charPreviewCanvas" width="160" height="160"></canvas>
        </div>
        <div class="charlib-row">
          <label>狀態</label>
          <select id="charActionSelect" class="charlib-sel" style="flex:1;"></select>
        </div>
        <div class="charlib-row">
          <label>速度</label>
          <input id="charSpeed" type="range" min="50" max="450" value="250" class="charlib-slider">
        </div>
        <div id="charPlaceRow" style="display:none;text-align:center;margin-top:8px;">
          <button id="charPlaceBtn" class="cloud-action primary">放置角色</button>
        </div>
      </div>
    </div>
  </div>
  <div id="cloudOverlay" class="help-overlay" style="display:none;">
    <div class="help-modal" style="max-width:380px;">
      <div class="help-header">
        <span id="cloudTitle">雲端存檔</span>
        <button id="cloudClose" class="help-close">&times;</button>
      </div>
      <div class="help-body" id="cloudBody" style="text-align:center;"></div>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
