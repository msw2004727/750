<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等距方塊建造器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div id="selectorRow">
      <select id="srcSelect"></select>
      <select id="catSelect"></select>
      <input id="tileSearch" type="text" placeholder="搜尋..." class="tile-search">
      <span id="hintToggle">操作說明 ▼</span>
    </div>
    <div id="tilePalette"></div>
    <div id="toggleRow">
      <span class="fold-toggle" data-target="foldTools">工具箱 ▼</span>
      <span class="fold-toggle" data-target="foldShortcuts">快捷類 ▼</span>
      <span class="fold-toggle" data-target="foldDisplay">顯示類 ▼</span>
      <span id="brushInfo" style="display:none;font-size:10px;color:#FFD700;"></span>
    </div>
    <div id="foldTools" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkBrush"> 筆刷</label>
      <label class="ck"><input type="checkbox" id="chkEraser"> 橡皮擦</label>
      <label class="ck"><input type="checkbox" id="chkFill"> 填充</label>
      <label class="ck"><input type="checkbox" id="chkRect"> 矩形</label>
      <label class="ck"><input type="checkbox" id="chkLine"> 線段</label>
    </div>
    <div id="foldShortcuts" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkSelect"> 選取</label>
      <label class="ck"><input type="checkbox" id="chkLocate"> 定位</label>
      <label class="ck"><input type="checkbox" id="chkCopy"> 複製</label>
    </div>
    <div id="foldDisplay" class="fold-panel" style="display:none;">
      <label class="ck"><input type="checkbox" id="chkHover"> 懸停</label>
      <label class="ck"><input type="checkbox" id="chkGrid"> 格線</label>
      <label class="ck"><input type="checkbox" id="chkVGrid"> 立體</label>
      <label class="ck"><input type="checkbox" id="chkCoord"> 座標</label>
      <label class="ck"><input type="checkbox" id="chkMinimap"> 小地圖</label>
    </div>
    <div id="visRow">
      <span class="label">隱藏高度：</span>
      <select id="hideHeight"><option value="">無</option></select>
      <button id="hideHeightBtn" class="toggle-btn">隱藏</button>
      <button id="showAllBtn" class="toggle-btn">全部顯示</button>
    </div>
    <div id="comboBar">
      <span class="label">範本：</span>
      <button id="comboSave" class="toggle-btn">儲存</button>
      <button id="comboPlace" class="toggle-btn">放置</button>
      <select id="comboSelect"><option value="">-- 選擇範本 --</option></select>
      <button id="comboDel" class="toggle-btn danger-sm">刪除</button>
    </div>
  </div>
  <div id="hintRow">
    <div id="actions">
      <button id="undoBtn" class="act-btn">返回</button>
      <button id="redoBtn" class="act-btn">復原</button>
      <button id="saveBtn" class="act-btn">儲存</button>
      <button id="loadBtn" class="act-btn">載入</button>
      <button id="homeBtn" class="act-btn">原點</button>
      <button id="exportImg" class="act-btn">匯出圖</button>
      <button id="clearBtn" class="act-btn danger">清除全部</button>
    </div>
  </div>
  <div id="helpPanel" style="display:none;"></div>
  <div id="canvasWrap">
    <div id="stagingArea">
      <div class="staging-title">暫存區</div>
      <div id="stagingGrid"></div>
    </div>
    <div id="hlPanel">
      <div class="hl-card">
        <div class="hl-title">高度</div>
        <button class="hl-btn" id="heightUp">&#9650;</button>
        <span id="heightNum" class="hl-num">0</span>
        <button class="hl-btn" id="heightDown">&#9660;</button>
      </div>
      <div class="hl-card">
        <div class="hl-title">圖層</div>
        <button class="hl-btn" id="layerUp">&#9650;</button>
        <span id="layerNum" class="hl-num">0</span>
        <button class="hl-btn" id="layerDown">&#9660;</button>
      </div>
    </div>
    <canvas id="c"></canvas>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
